version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn structured_ocr.api.app:create_app --host 0.0.0.0 --port 8000 --factory
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./output:/app/output
    environment:
      - TEXLIVE_INSTALL_PREFIX=/usr/local/texlive
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s